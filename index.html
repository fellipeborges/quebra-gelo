<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quebra Gelo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="theme-dropdown" id="theme-dropdown">

            <div class="theme-dropdown-menu" id="theme-menu"></div>

    <div class="container">
        <div class="categories" id="categories"></div>
        <p class="question" id="question"></p>
        <button class="btn" id="btn" onclick="pickQuestion()">Nova pergunta</button>
    </div>

    <a href="https://github.com/fellipeborges/quebra-gelo" target="_blank" class="github-link" id="footer-link">Código fonte</a>

    <script src="i18n.js"></script>
