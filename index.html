<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quebra Gelo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLanguage()">EN</button>

    <div class="container">
        <div class="categories" id="categories"></div>
        <p class="question" id="question"></p>
        <button class="btn" id="btn" onclick="pickQuestion()">Nova pergunta</button>
        <p class="hint" id="hint">ou pressione <kbd id="hint-key">espaço</kbd></p>
    </div>

    <a href="https://github.com/fellipeborges/quebra-gelo" target="_blank" class="github-link" id="footer-link">Código fonte</a>

    <script src="i18n.js"></script>
    <script src="questions.js"></script>
    <script>
        let currentQuestion = -1;
        let currentLang = localStorage.getItem('lang') || 'pt';
        const categoryIds = ['hypothetical', 'fun', 'experiences', 'preferences', 'reflection'];
        const activeCategories = new Set(categoryIds);

        const questionElement = document.getElementById('question');
        const btnElement = document.getElementById('btn');
        const hintElement = document.getElementById('hint');
        const footerLink = document.getElementById('footer-link');
        const langToggle = document.getElementById('lang-toggle');
        const categoriesContainer = document.getElementById('categories');

        function renderCategories() {
            categoriesContainer.innerHTML = '';
            for (const id of categoryIds) {
                const chip = document.createElement('button');
                chip.className = 'category-chip' + (activeCategories.has(id) ? ' active' : '');
                chip.textContent = ui[currentLang].categories[id];
                chip.onclick = () => toggleCategory(id);
                categoriesContainer.appendChild(chip);
            }
        }

        function toggleCategory(id) {
            if (activeCategories.has(id)) {
                if (activeCategories.size <= 1) return;
                activeCategories.delete(id);
            } else {
                activeCategories.add(id);
            }
            renderCategories();
            currentQuestion = -1;
            pickQuestion();
        }

        function getFilteredIndices() {
            return questionCategories
                .map((cat, i) => activeCategories.has(cat) ? i : -1)
                .filter(i => i !== -1);
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);

            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en';
            document.title = ui[lang].title;
            btnElement.textContent = ui[lang].btn;
            hintElement.innerHTML = ui[lang].hint + ' <kbd>' + ui[lang].key + '</kbd>';
            footerLink.textContent = ui[lang].footer;
            langToggle.textContent = lang === 'pt' ? 'EN' : 'PT';

            renderCategories();
            currentQuestion = -1;
            pickQuestion();
        }

        function toggleLanguage() {
            setLanguage(currentLang === 'pt' ? 'en' : 'pt');
        }

        function pickQuestion() {
            const indices = getFilteredIndices();
            const pool = questions[currentLang];
            let next;
            do {
                next = indices[Math.floor(Math.random() * indices.length)];
            } while (next === currentQuestion && indices.length > 1);

            currentQuestion = next;

            questionElement.classList.remove('enter');
            questionElement.classList.add('exit');

            setTimeout(() => {
                questionElement.textContent = pool[next];
                questionElement.classList.remove('exit');
                questionElement.classList.add('enter');
            }, 150);
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                btnElement.classList.add('active');
                pickQuestion();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                btnElement.classList.remove('active');
            }
        });

        setLanguage(currentLang);
    </script>
</body>
</html>
